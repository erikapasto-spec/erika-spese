<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2D1B69">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Le mie spese">
<title>Le mie spese — Erika</title>
<style>
:root{--viola:#2D1B69;--viola-light:#4A2FA0;--rosa:#E91E8C;--crema:#FAF8FF;--beige-light:#EDE8F5}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--crema);color:#1a1a2e;min-height:100vh}
.topbar{background:linear-gradient(135deg,var(--viola) 0%,var(--viola-light) 60%,#7B2FBE 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(45,27,105,0.4)}
.topbar-inner{height:80px;display:flex;align-items:center;padding:0 16px;gap:14px}
.topbar-emoji{font-size:36px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.topbar-text{}
.topbar-title{font-size:20px;font-weight:800;letter-spacing:0.5px;color:#fff}
.topbar-sub{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.7);margin-top:2px}
.tabs{display:flex;background:var(--viola);border-bottom:2px solid var(--rosa);position:sticky;top:80px;z-index:99;overflow-x:auto}
.tab{flex:1;min-width:80px;padding:10px 4px;text-align:center;font-size:11px;color:rgba(255,255,255,0.5);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-weight:600;margin-bottom:-2px}
.tab.active{color:#fff;border-bottom-color:var(--rosa)}
.tab-icon{font-size:18px;display:block;margin-bottom:2px}
.page{display:none;padding:16px;max-width:520px;margin:0 auto}
.page.active{display:block}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(45,27,105,0.08);border:1px solid var(--beige-light)}
.card-title{font-size:11px;font-weight:700;color:var(--viola);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:15px;color:#1a1a2e;background:#fff;-webkit-appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:var(--viola)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-save{width:100%;padding:14px;background:linear-gradient(135deg,var(--viola),var(--viola-light));color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-save:active{opacity:0.85}
.btn-outline{width:100%;padding:12px;background:#fff;color:var(--viola);border:1.5px solid var(--viola);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--beige-light);border-radius:12px;padding:12px}
.stat-label{font-size:11px;color:var(--viola);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:700;color:#1a1a2e}
.stat.full{grid-column:1/-1;background:var(--viola)}
.stat.full .stat-label{color:rgba(255,255,255,0.7)}
.stat.full .stat-value{color:#fff;font-size:22px}
.stat.positive{background:#E8F5E9}
.stat.positive .stat-label{color:#2E7D32}
.stat.positive .stat-value{color:#1B5E20}
.stat.negative{background:#FFEBEE}
.stat.negative .stat-label{color:#B71C1C}
.stat.negative .stat-value{color:#C62828}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-label{font-size:12px;color:#555;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-bg{flex:1;background:#f0eef8;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-size:12px;font-weight:600;width:80px;text-align:right;flex-shrink:0}
.entry-list{display:flex;flex-direction:column;gap:6px}
.entry{background:#fff;border:1.5px solid #f0eef8;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.entry-cat{font-size:18px;flex-shrink:0}
.entry-info{flex:1;min-width:0}
.entry-desc{font-size:13px;font-weight:500;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:11px;color:#888;margin-top:2px}
.entry-badge{font-size:10px;background:var(--beige-light);color:var(--viola);padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block}
.entry-importo{font-size:14px;font-weight:700;flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:#aaa}
.empty-icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:30px;color:var(--viola);font-size:14px}
.mese-bar{display:flex;gap:8px;margin-bottom:12px}
.mese-bar select{flex:1;padding:10px 12px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:14px;background:#fff}
.refresh-btn{padding:10px 14px;background:var(--beige-light);border:1.5px solid var(--viola);border-radius:10px;color:var(--viola);font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:24px;font-size:14px;font-weight:500;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.toast.ok{background:var(--viola);color:#fff}
.toast.err{background:#C62828;color:#fff}
.switch-bar{display:flex;gap:4px;background:#fff;border-radius:12px;padding:4px;border:1px solid var(--beige-light);margin-bottom:12px}
.switch-btn{flex:1;padding:9px 4px;border:none;border-radius:10px;background:none;color:var(--viola);font-size:13px;font-weight:600;cursor:pointer}
.switch-btn.active{background:var(--viola);color:#fff}
.upload-box{border:2px dashed var(--beige-light);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px}
.upload-box:hover{border-color:var(--viola);background:var(--beige-light)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-emoji">💜</div>
    <div class="topbar-text">
      <div class="topbar-title">Le mie spese</div>
      <div class="topbar-sub">ERIKA PASTORELLI</div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('dashboard',this)"><span class="tab-icon">📊</span>Dashboard</button>
  <button class="tab" onclick="showPage('movimenti',this)"><span class="tab-icon">📋</span>Movimenti</button>
  <button class="tab" onclick="showPage('analisi',this)"><span class="tab-icon">🔍</span>Analisi</button>
</div>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div class="mese-bar">
    <select id="dash-conto" onchange="caricaDashboard()">
      <option value="Conto Erika">💜 Conto Erika</option>
      <option value="Conto Comune">🏠 Conto Comune</option>
    </select>
    <select id="dash-mese" onchange="caricaDashboard()">
      <option value="">Tutti i mesi</option>
    </select>
    <button class="refresh-btn" onclick="caricaDashboard()">↻</button>
  </div>
  <div id="dash-container"><div class="loading">⏳ Caricamento...</div></div>
</div>

<!-- MOVIMENTI -->
<div class="page" id="page-movimenti">
  <div class="mese-bar">
    <select id="mov-conto" onchange="caricaMovimenti()">
      <option value="Conto Erika">💜 Conto Erika</option>
      <option value="Conto Comune">🏠 Conto Comune</option>
    </select>
    <select id="mov-mese" onchange="caricaMovimenti()">
      <option value="">Tutti i mesi</option>
    </select>
    <button class="refresh-btn" onclick="caricaMovimenti()">↻</button>
  </div>
  <div style="position:relative;margin-bottom:12px">
    <input type="text" id="mov-search" placeholder="🔍 Cerca..." oninput="filtraMovimenti(this.value)" style="width:100%;padding:10px 14px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:14px">
  </div>
  <div id="mov-container"><div class="loading">⏳ Caricamento...</div></div>
</div>

<!-- ANALISI -->
<div class="page" id="page-analisi">
  <div class="switch-bar">
    <button class="switch-btn active" onclick="switchAnalisi('periodo',this)">📅 Per periodo</button>
    <button class="switch-btn" onclick="switchAnalisi('confronto',this)">⚖️ Confronto mesi</button>
  </div>

  <div id="an-view-periodo">
  <div class="card">
    <div class="card-title">Analisi per periodo</div>
    <div class="field">
      <label>Conto</label>
      <select id="an-conto">
        <option value="Conto Erika">💜 Conto Erika</option>
        <option value="Conto Comune">🏠 Conto Comune</option>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>Dal</label><input type="date" id="an-dal"></div>
      <div class="field"><label>Al</label><input type="date" id="an-al"></div>
    </div>
    <div class="field">
      <label>Categoria (opzionale)</label>
      <input type="text" id="an-cat" placeholder="es. Carburante, Viaggi, Shopping...">
    </div>
    <button class="btn-save" onclick="eseguiAnalisi()">🔍 Analizza periodo</button>
  </div>
  <div id="analisi-container"></div>
  </div><!-- end an-view-periodo -->

  <div id="an-view-confronto" style="display:none">
    <div class="card">
      <div class="card-title">Confronto tra mesi</div>
      <div class="field">
        <label>Conto</label>
        <select id="conf-conto-an">
          <option value="Conto Erika">💜 Conto Erika</option>
          <option value="Conto Comune">🏠 Conto Comune</option>
        </select>
      </div>
      <div class="field">
        <label>Categoria (opzionale — vuota = tutte le spese)</label>
        <input type="text" id="conf-cat-an" placeholder="es. Carburante, Viaggi...">
      </div>
      <button class="btn-save" onclick="eseguiConfronto()">⚖️ Confronta mesi</button>
    </div>
    <div id="confronto-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxEpdLiLnsZxjcy_hJWLDrGD63_XXpJY-h5Ta5SGJ66UGNt1JzrLVAgSPEk26cOlQo8/exec';
const MESI_NOMI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

const CAT_EMOJI={
  'Shopping/Amazon':'🛒','Spesa':'🥦','Utenze':'💡','Assicurazioni':'🛡️',
  'Sport':'⚽','Istruzione figli':'📚','Salute':'❤️','Farmacia':'💊',
  'Ristoranti e bar':'🍽️','Viaggi':'✈️','Trasporti':'🚗','Carburante':'⛽',
  'Abbigliamento':'👗','Cura persona':'💅','Casa':'🏠','Animali':'🐾',
  'Svago':'🎉','Tecnologia':'💻','Telefono':'📱','Tasse/Commissioni':'🏦',
  'Utenze/Investimenti':'📈','Entrate varie':'💰','Stipendio':'💼',
  'Rimborsi':'↩️','Prelievi':'🏧','Bonifici uscita':'📤','Altro':'📌'
};

const CAT_COLORS={
  'Shopping/Amazon':'#E91E8C','Spesa':'#4CAF50','Utenze':'#2196F3',
  'Assicurazioni':'#9C27B0','Sport':'#FF5722','Istruzione figli':'#FF9800',
  'Salute':'#F44336','Farmacia':'#E91E63','Ristoranti e bar':'#795548',
  'Viaggi':'#00BCD4','Trasporti':'#607D8B','Carburante':'#FF6F00',
  'Abbigliamento':'#EC407A','Cura persona':'#AB47BC','Casa':'#5C6BC0',
  'Animali':'#8D6E63','Svago':'#26C6DA','Tecnologia':'#42A5F5',
  'Telefono':'#66BB6A','Tasse/Commissioni':'#78909C','Utenze/Investimenti':'#7E57C2',
  'Entrate varie':'#43A047','Stipendio':'#1B5E20','Rimborsi':'#00897B',
  'Prelievi':'#546E7A','Bonifici uscita':'#8E24AA','Altro':'#9E9E9E'
};

let tuttiMovimenti=[];
let movimentiFiltrati=[];

function switchAnalisi(view, btn){
  document.querySelectorAll('.switch-bar .switch-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('an-view-periodo').style.display=view==='periodo'?'block':'none';
  document.getElementById('an-view-confronto').style.display=view==='confronto'?'block':'none';
}

async function eseguiConfronto(){
  const conto=document.getElementById('conf-conto-an').value;
  const catFiltro=document.getElementById('conf-cat-an').value.toLowerCase().trim();
  const cont=document.getElementById('confronto-container');
  cont.innerHTML='<div class="loading">⏳ Caricamento...</div>';
  try{
    const res=await jsonp({action:'leggiMovimenti',conto});
    const movimenti=res.movimenti||[];
    const mesiDisp=res.mesiDisp||[];

    // Raggruppa per mese
    const perMese={};
    mesiDisp.forEach(m=>perMese[m]={entrate:0,uscite:0,cats:{}});
    movimenti.forEach(m=>{
      if(!perMese[m.mese])return;
      const inCat=!catFiltro||m.cat.toLowerCase().includes(catFiltro)||m.desc.toLowerCase().includes(catFiltro);
      if(!inCat)return;
      if(m.importo<0){
        perMese[m.mese].uscite+=Math.abs(m.importo);
        if(!perMese[m.mese].cats[m.cat])perMese[m.mese].cats[m.cat]=0;
        perMese[m.mese].cats[m.cat]+=Math.abs(m.importo);
      } else {
        perMese[m.mese].entrate+=m.importo;
      }
    });

    const mesiOrdinati=mesiDisp.sort();
    const maxU=Math.max(...mesiOrdinati.map(m=>perMese[m]?.uscite||0),1);

    // Tutte le categorie presenti
    const tuttiCats=new Set();
    mesiOrdinati.forEach(m=>Object.keys(perMese[m]?.cats||{}).forEach(c=>tuttiCats.add(c)));

    let html=`<div class="card"><div class="card-title">${conto}${catFiltro?' · '+catFiltro:' · Tutte le categorie'}</div>`;

    // Grafico a barre per mese
    html+=`<div style="margin-bottom:16px">`;
    mesiOrdinati.forEach(m=>{
      const [anno,mese]=m.split('-');
      const nome=MESI_NOMI[parseInt(mese)-1].slice(0,3)+' '+anno;
      const val=perMese[m]?.uscite||0;
      const pct=Math.round((val/maxU)*100);
      html+=`<div class="bar-row">
        <div class="bar-label">${nome}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:var(--viola)"></div></div>
        <div class="bar-val" style="color:var(--viola)">${fmt(val)}</div>
      </div>`;
    });
    html+=`</div></div>`;

    // Tabella dettaglio per categoria
    if(!catFiltro&&tuttiCats.size>0){
      html+=`<div class="card" style="overflow-x:auto"><div class="card-title">Dettaglio per categoria</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="border-bottom:2px solid var(--beige-light)">
            <th style="text-align:left;padding:6px 4px;color:var(--viola)">Categoria</th>`;
      mesiOrdinati.forEach(m=>{
        const [anno,mese]=m.split('-');
        html+=`<th style="text-align:right;padding:6px 4px;color:var(--viola)">${MESI_NOMI[parseInt(mese)-1].slice(0,3)}</th>`;
      });
      html+=`<th style="text-align:right;padding:6px 4px;color:var(--viola)">TOT</th></tr></thead><tbody>`;

      Array.from(tuttiCats).sort().forEach(cat=>{
        const emoji=CAT_EMOJI[cat]||'📌';
        const totCat=mesiOrdinati.reduce((s,m)=>s+(perMese[m]?.cats[cat]||0),0);
        if(totCat===0)return;
        html+=`<tr style="border-bottom:1px solid #f5f5f5">
          <td style="padding:6px 4px;font-weight:500">${emoji} ${cat}</td>`;
        mesiOrdinati.forEach(m=>{
          const val=perMese[m]?.cats[cat]||0;
          html+=`<td style="text-align:right;padding:6px 4px;color:${val>0?'#C62828':'#aaa'}">${val>0?fmt(val):'—'}</td>`;
        });
        html+=`<td style="text-align:right;padding:6px 4px;font-weight:700;color:#C62828">${fmt(totCat)}</td></tr>`;
      });

      // Totale
      html+=`<tr style="border-top:2px solid var(--viola)">
        <td style="padding:8px 4px;font-weight:700">TOTALE</td>`;
      mesiOrdinati.forEach(m=>{
        html+=`<td style="text-align:right;padding:8px 4px;font-weight:700;color:var(--viola)">${fmt(perMese[m]?.uscite||0)}</td>`;
      });
      const totAll=mesiOrdinati.reduce((s,m)=>s+(perMese[m]?.uscite||0),0);
      html+=`<td style="text-align:right;padding:8px 4px;font-weight:700;color:var(--viola)">${fmt(totAll)}</td></tr>`;
      html+=`</tbody></table></div>`;
    }

    cont.innerHTML=html;
  }catch(e){
    cont.innerHTML='<div class="empty"><div class="empty-icon">📡</div><p>Errore connessione. Riprova.</p></div>';
  }
}

async function eseguiAnalisi(){
  const conto=document.getElementById('an-conto').value;
  const dal=document.getElementById('an-dal').value;
  const al=document.getElementById('an-al').value;
  if(!dal||!al){mostraToast('❌ Inserisci le date','err');return;}
  const cont=document.getElementById('analisi-container');
  cont.innerHTML='<div class="loading">⏳ Caricamento...</div>';
  try{
    const res=await jsonp({action:'leggiMovimenti',conto});
    const dalDate=new Date(dal+'T00:00:00');
    const alDate=new Date(al+'T23:59:59');
    const catFiltro=document.getElementById('an-cat').value.toLowerCase().trim();
    const filtrati=(res.movimenti||[]).filter(m=>{
      const d=new Date(m.data+'T12:00:00');
      const inPeriodo=d>=dalDate&&d<=alDate;
      const inCat=!catFiltro||m.cat.toLowerCase().includes(catFiltro)||m.desc.toLowerCase().includes(catFiltro);
      return inPeriodo&&inCat;
    });
    if(filtrati.length===0){
      cont.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>Nessun movimento nel periodo selezionato.</p></div>';
      return;
    }
    const dalFmt=new Date(dal+'T12:00:00').toLocaleDateString('it-IT');
    const alFmt=new Date(al+'T12:00:00').toLocaleDateString('it-IT');
    const catFiltroLabel=document.getElementById('an-cat').value.trim();
    const totE=filtrati.filter(m=>m.importo>0).reduce((s,m)=>s+m.importo,0);
    const totU=filtrati.filter(m=>m.importo<0).reduce((s,m)=>s+m.importo,0);
    const saldo=totE+totU;
    // Raggruppa per categoria
    const cats={};
    filtrati.forEach(m=>{
      if(!cats[m.cat])cats[m.cat]={entrate:0,uscite:0,n:0};
      if(m.importo>0)cats[m.cat].entrate+=m.importo;
      else cats[m.cat].uscite+=Math.abs(m.importo);
      cats[m.cat].n++;
    });
    const catUscite=Object.entries(cats).filter(([,v])=>v.uscite>0).sort((a,b)=>b[1].uscite-a[1].uscite);
    const catEntrate=Object.entries(cats).filter(([,v])=>v.entrate>0).sort((a,b)=>b[1].entrate-a[1].entrate);
    const maxU=catUscite.length>0?catUscite[0][1].uscite:1;
    const colSaldo=saldo>=0?'positive':'negative';
    let html=`<div class="card" style="padding:12px">
      <div class="card-title">${conto} · ${dalFmt} → ${alFmt}${catFiltroLabel?' · '+catFiltroLabel:''}</div>
      <div class="stat-grid">
        <div class="stat positive"><div class="stat-label">Entrate</div><div class="stat-value">${fmt(totE)}</div></div>
        <div class="stat negative"><div class="stat-label">Uscite</div><div class="stat-value">${fmt(Math.abs(totU))}</div></div>
        <div class="stat ${colSaldo} full"><div class="stat-label">SALDO PERIODO</div><div class="stat-value">${fmtSigned(saldo)}</div></div>
      </div>
    </div>`;
    if(catUscite.length>0){
      html+=`<div class="card"><div class="card-title">💸 Spese per categoria</div>`;
      catUscite.forEach(([cat,v])=>{
        const pct=Math.round((v.uscite/maxU)*100);
        const col=CAT_COLORS[cat]||'#9E9E9E';
        const emoji=CAT_EMOJI[cat]||'📌';
        html+=`<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500">${emoji} ${cat} <span style="color:#aaa;font-size:11px">(${v.n} mov.)</span></span>
            <span style="font-size:14px;font-weight:700;color:${col}">${fmt(v.uscite)}</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
        </div>`;
      });
      html+=`<div style="display:flex;justify-content:space-between;padding-top:8px;font-weight:700;font-size:14px">
        <span>TOTALE SPESE</span><span style="color:#C62828">${fmt(Math.abs(totU))}</span>
      </div></div>`;
    }
    if(catEntrate.length>0){
      html+=`<div class="card"><div class="card-title">💰 Entrate per categoria</div>`;
      catEntrate.forEach(([cat,v])=>{
        const col=CAT_COLORS[cat]||'#43A047';
        const emoji=CAT_EMOJI[cat]||'💰';
        html+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5">
          <span style="font-size:13px">${emoji} ${cat} <span style="color:#aaa;font-size:11px">(${v.n} mov.)</span></span>
          <span style="font-size:14px;font-weight:700;color:#1B5E20">${fmt(v.entrate)}</span>
        </div>`;
      });
      html+=`<div style="display:flex;justify-content:space-between;padding-top:8px;font-weight:700;font-size:14px">
        <span>TOTALE ENTRATE</span><span style="color:#1B5E20">${fmt(totE)}</span>
      </div></div>`;
    }
    // Lista movimenti del periodo
    html+=`<div class="card"><div class="card-title">Tutti i movimenti (${filtrati.length})</div><div class="entry-list">`;
    filtrati.sort((a,b)=>b.data.localeCompare(a.data)).forEach(m=>{
      const col=m.importo>=0?'#1B5E20':'#C62828';
      const emoji=CAT_EMOJI[m.cat]||'📌';
      html+=`<div class="entry">
        <div class="entry-cat">${emoji}</div>
        <div class="entry-info">
          <div class="entry-desc">${m.desc}</div>
          <div class="entry-meta"><span class="entry-badge">${m.cat}</span> · ${m.data}</div>
        </div>
        <div class="entry-importo" style="color:${col}">${m.importo>=0?'+':''}${fmt(m.importo)}</div>
      </div>`;
    });
    html+=`</div></div>`;
    cont.innerHTML=html;
  }catch(e){
    cont.innerHTML='<div class="empty"><div class="empty-icon">📡</div><p>Errore connessione. Riprova.</p></div>';
  }
}

function fmt(n){return '€'+Math.abs(parseFloat(n||0)).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtSigned(n){const v=parseFloat(n||0);return (v>=0?'+':'')+v.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2})+'€';}

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const to=setTimeout(()=>{delete window[cb];reject(new Error('Timeout'));},45000);
    window[cb]=d=>{clearTimeout(to);delete window[cb];resolve(d);};
    const qs=Object.entries({...params,callback:cb}).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(String(v))).join('&');
    const s=document.createElement('script');
    s.src=SCRIPT_URL+'?'+qs;
    s.onerror=()=>{clearTimeout(to);delete window[cb];s.remove();reject(new Error('Errore'));};
    document.head.appendChild(s);
    setTimeout(()=>{if(s.parentNode)s.remove();},46000);
  });
}

function mostraToast(msg,tipo){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+tipo;t.style.display='block';
  setTimeout(()=>t.style.display='none',3500);
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='dashboard')caricaDashboard();
  if(id==='analisi'){
    // Set default date range to current year
    const oggi=new Date();
    const primoAnno=oggi.getFullYear()+'-01-01';
    const oggiStr=oggi.toISOString().slice(0,10);
    const dal=document.getElementById('an-dal');
    const al=document.getElementById('an-al');
    if(!dal.value)dal.value=primoAnno;
    if(!al.value)al.value=oggiStr;
  }
  if(id==='movimenti')caricaMovimenti();
}

function aggiornaMesiSelect(mesiDisp, selId){
  const sel=document.getElementById(selId);
  const cur=sel.value;
  while(sel.options.length>1)sel.remove(1);
  (mesiDisp||[]).sort().reverse().forEach(m=>{
    const [anno,mese]=m.split('-');
    const nome=MESI_NOMI[parseInt(mese)-1]+' '+anno;
    const opt=new Option(nome,m);
    sel.add(opt);
  });
  if(cur)sel.value=cur;
}

async function caricaDashboard(){
  const conto=document.getElementById('dash-conto').value;
  const mese=document.getElementById('dash-mese').value;
  const cont=document.getElementById('dash-container');
  cont.innerHTML='<div class="loading">⏳ Caricamento...</div>';
  try{
    const res=await jsonp({action:'leggiMovimenti',conto,mese});
    aggiornaMesiSelect(res.mesiDisp,'dash-mese');
    renderDashboard(res.movimenti||[], conto, mese);
  }catch(e){
    cont.innerHTML='<div class="empty"><div class="empty-icon">📡</div><p>Errore connessione.<br>Riprova.</p></div>';
  }
}

function renderDashboard(movimenti, conto, mese){
  const cont=document.getElementById('dash-container');
  if(movimenti.length===0){
    cont.innerHTML='<div class="empty"><div class="empty-icon">💜</div><p>Nessun dato disponibile.<br>Carica i movimenti dalla sezione 📂</p></div>';
    return;
  }
  const entrate=movimenti.filter(m=>m.importo>0).reduce((s,m)=>s+m.importo,0);
  const uscite=movimenti.filter(m=>m.importo<0).reduce((s,m)=>s+m.importo,0);
  const saldo=entrate+uscite;
  const colSaldo=saldo>=0?'positive':'negative';

  // Raggruppa per categoria (solo uscite)
  const cats={};
  movimenti.filter(m=>m.importo<0).forEach(m=>{
    if(!cats[m.cat])cats[m.cat]=0;
    cats[m.cat]+=Math.abs(m.importo);
  });
  const catSort=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const maxCat=catSort.length>0?catSort[0][1]:1;

  // Titolo periodo
  let titoloPeriodo=conto;
  if(mese){const[a,m]=mese.split('-');titoloPeriodo+=` — ${MESI_NOMI[parseInt(m)-1]} ${a}`;}

  let html=`<div class="card" style="padding:12px">
    <div class="card-title">${titoloPeriodo}</div>
    <div class="stat-grid">
      <div class="stat positive"><div class="stat-label">Entrate</div><div class="stat-value">${fmt(entrate)}</div></div>
      <div class="stat negative"><div class="stat-label">Uscite</div><div class="stat-value">${fmt(Math.abs(uscite))}</div></div>
      <div class="stat ${colSaldo} full"><div class="stat-label">SALDO</div><div class="stat-value">${fmtSigned(saldo)}</div></div>
    </div>
  </div>`;

  if(catSort.length>0){
    html+=`<div class="card"><div class="card-title">Spese per categoria</div>`;
    catSort.forEach(([cat,val])=>{
      const pct=Math.round((val/maxCat)*100);
      const col=CAT_COLORS[cat]||'#9E9E9E';
      const emoji=CAT_EMOJI[cat]||'📌';
      html+=`<div class="bar-row">
        <div class="bar-label">${emoji} ${cat}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="bar-val" style="color:${col}">${fmt(val)}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Top 5 spese
  const top5=movimenti.filter(m=>m.importo<0).sort((a,b)=>a.importo-b.importo).slice(0,5);
  if(top5.length>0){
    html+=`<div class="card"><div class="card-title">Top spese</div><div class="entry-list">`;
    top5.forEach(m=>{
      const col=CAT_COLORS[m.cat]||'#9E9E9E';
      const emoji=CAT_EMOJI[m.cat]||'📌';
      html+=`<div class="entry">
        <div class="entry-cat">${emoji}</div>
        <div class="entry-info">
          <div class="entry-desc">${m.desc}</div>
          <div class="entry-meta"><span class="entry-badge">${m.cat}</span> ${m.data}</div>
        </div>
        <div class="entry-importo" style="color:#C62828">${fmt(m.importo)}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  cont.innerHTML=html;
}

async function caricaMovimenti(){
  const conto=document.getElementById('mov-conto').value;
  const mese=document.getElementById('mov-mese').value;
  const cont=document.getElementById('mov-container');
  cont.innerHTML='<div class="loading">⏳ Caricamento...</div>';
  document.getElementById('mov-search').value='';
  try{
    const res=await jsonp({action:'leggiMovimenti',conto,mese});
    aggiornaMesiSelect(res.mesiDisp,'mov-mese');
    tuttiMovimenti=res.movimenti||[];
    movimentiFiltrati=tuttiMovimenti;
    renderMovimenti(tuttiMovimenti);
  }catch(e){
    cont.innerHTML='<div class="empty"><div class="empty-icon">📡</div><p>Errore connessione.</p></div>';
  }
}

function filtraMovimenti(query){
  const q=query.toLowerCase().trim();
  movimentiFiltrati=q?tuttiMovimenti.filter(m=>m.desc.toLowerCase().includes(q)||m.cat.toLowerCase().includes(q)):tuttiMovimenti;
  renderMovimenti(movimentiFiltrati);
}

function renderMovimenti(movimenti){
  const cont=document.getElementById('mov-container');
  if(movimenti.length===0){
    cont.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>Nessun movimento trovato.</p></div>';
    return;
  }
  const totE=movimenti.filter(m=>m.importo>0).reduce((s,m)=>s+m.importo,0);
  const totU=movimenti.filter(m=>m.importo<0).reduce((s,m)=>s+m.importo,0);
  let html=`<div class="card" style="padding:10px;margin-bottom:8px">
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Entrate</div><div class="stat-value" style="font-size:15px;color:#1B5E20">${fmt(totE)}</div></div>
      <div class="stat"><div class="stat-label">Uscite</div><div class="stat-value" style="font-size:15px;color:#C62828">${fmt(Math.abs(totU))}</div></div>
    </div>
  </div><div class="entry-list">`;
  movimenti.forEach(m=>{
    const col=m.importo>=0?'#1B5E20':'#C62828';
    const emoji=CAT_EMOJI[m.cat]||'📌';
    html+=`<div class="entry">
      <div class="entry-cat">${emoji}</div>
      <div class="entry-info">
        <div class="entry-desc">${m.desc}</div>
        <div class="entry-meta"><span class="entry-badge">${m.cat}</span> · ${m.data}</div>
      </div>
      <div class="entry-importo" style="color:${col}">${m.importo>=0?'+':''}${fmt(m.importo)}</div>
    </div>`;
  });
  html+=`</div>`;
  cont.innerHTML=html;
}


// INIT
caricaDashboard();
</script>
</body>
</html>
